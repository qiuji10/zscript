name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      rng_seed:
        description: "Catch2 RNG seed to pass to tests, e.g. 1150817212"
        required: false
        type: string
        default: ""

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      ZSCRIPT_TEST_RNG_SEED: ${{ github.event_name == 'workflow_dispatch' && inputs.rng_seed || '' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5

      # Cache the FetchContent download (Catch2 shallow clone) keyed by OS +
      # CMakeLists.txt so the cache is invalidated when deps change.
      - name: Cache build dependencies
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: deps-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-${{ matrix.os }}-

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DZSCRIPT_TEST_RNG_SEED="${{ env.ZSCRIPT_TEST_RNG_SEED }}"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure --parallel 4

  fuzz:
    name: Fuzzer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            # apt clang is LLVM clang — libFuzzer included.
            install: sudo apt-get install -y clang ninja-build
            clang: clang++
            generator: ""
            exe: ./build-fuzz/fuzz_lexer_parser

          - os: macos-latest
            # Apple clang does NOT ship libFuzzer. Install LLVM via Homebrew and
            # resolve the prefix at runtime so the path works on both Intel and ARM.
            install: brew install llvm ninja
            clang: "$(brew --prefix llvm)/bin/clang++"
            generator: ""
            exe: ./build-fuzz/fuzz_lexer_parser

          - os: windows-latest
            # LLVM and Ninja are pre-installed on GitHub-hosted Windows runners.
            # Must use -G Ninja — the VS generator ignores CMAKE_CXX_COMPILER.
            # The fuzz build uses clang; the normal 'build' job still uses MSVC.
            install: echo "LLVM and Ninja pre-installed"
            clang: "C:/Program Files/LLVM/bin/clang++.exe"
            generator: "-G Ninja"
            exe: ./build-fuzz/fuzz_lexer_parser.exe

    steps:
      - uses: actions/checkout@v5

      - name: Install / verify clang
        run: ${{ matrix.install }}

      - name: Cache build dependencies
        uses: actions/cache@v5
        with:
          path: build-fuzz/_deps
          key: deps-fuzz-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-fuzz-${{ matrix.os }}-

      - name: Configure
        run: >
          cmake -B build-fuzz
          ${{ matrix.generator }}
          -DCMAKE_CXX_COMPILER="${{ matrix.clang }}"
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DZSCRIPT_FUZZ=ON

      - name: Build fuzzer
        run: cmake --build build-fuzz --target fuzz_lexer_parser --parallel

      - name: Run fuzzer (30 s smoke run)
        run: >
          ${{ matrix.exe }} fuzz/corpus
          -max_len=4096
          -timeout=5
          -max_total_time=30
          -print_final_stats=1
