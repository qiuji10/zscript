name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5

      # Cache the FetchContent download (Catch2 shallow clone) keyed by OS +
      # CMakeLists.txt so the cache is invalidated when deps change.
      - name: Cache build dependencies
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: deps-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-${{ matrix.os }}-

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure --parallel 4
