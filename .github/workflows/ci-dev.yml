name: CI Dev

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [develop]
    paths:
      - 'src/**'
      - 'unity/**'
      - 'nuget/**'
      - 'tools/**'
      - 'fuzz/**'
      - 'CMakeLists.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [develop, main]
    paths:
      - 'src/**'
      - 'unity/**'
      - 'nuget/**'
      - 'tools/**'
      - 'fuzz/**'
      - 'CMakeLists.txt'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      rng_seed:
        description: "Catch2 RNG seed to pass to tests, e.g. 1150817212"
        required: false
        type: string
        default: ""
      run_fuzz:
        description: "Run fuzz smoke jobs"
        required: false
        type: boolean
        default: true
      run_unity:
        description: "Run Unity EditMode child pipeline"
        required: false
        type: boolean
        default: true
      run_unity_package:
        description: "Run Unity plugin packaging child pipeline"
        required: false
        type: boolean
        default: true
      run_ilcpp_smoke:
        description: "Run Unity IL2CPP link.xml smoke child pipeline"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  native-ci:
    name: Native validation
    uses: ./.github/workflows/native-ci.yml
    with:
      rng_seed: ${{ inputs.rng_seed || '' }}
      run_fuzz: ${{ github.event_name != 'workflow_dispatch' || inputs.run_fuzz }}

  link-xml-validate:
    name: Static link.xml validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate link.xml
        run: python3 tools/validate_link_xml.py

  unity-tests:
    name: Unity EditMode child pipeline
    if: ${{ (github.event_name != 'pull_request') && (github.event_name != 'workflow_dispatch' || inputs.run_unity) }}
    uses: ./.github/workflows/unity-test.yml
    secrets: inherit

  unity-ilcpp-smoke:
    name: Unity IL2CPP link.xml smoke child pipeline
    if: ${{ (github.event_name != 'pull_request') && (github.event_name != 'workflow_dispatch' || inputs.run_ilcpp_smoke) }}
    uses: ./.github/workflows/unity-ilcpp-smoke.yml
    secrets: inherit

  unity-plugin-package:
    name: Unity plugin package child pipeline
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_unity_package }}
    uses: ./.github/workflows/unity-plugin-package.yml

  dev-summary:
    name: Summary
    if: always()
    needs: [native-ci, link-xml-validate, unity-tests, unity-ilcpp-smoke, unity-plugin-package]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Download JUnit test artifacts
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          pattern: '*-junit-*'
          path: test-artifacts
          merge-multiple: false

      - name: Publish summary
        env:
          NATIVE_RESULT: ${{ needs.native-ci.result }}
          LINK_XML_RESULT: ${{ needs.link-xml-validate.result }}
          UNITY_RESULT: ${{ needs.unity-tests.result }}
          ILCPP_RESULT: ${{ needs.unity-ilcpp-smoke.result }}
          PACKAGE_RESULT: ${{ needs.unity-plugin-package.result }}
        shell: bash
        run: |
          python3 tools/render_junit_summary.py test-artifacts >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${LINK_XML_RESULT}" != "success" ] && [ "${LINK_XML_RESULT}" != "skipped" ]; then
            echo "> :warning: Static link.xml validation result: ${LINK_XML_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${UNITY_RESULT}" = "skipped" ]; then
            echo "> Unity EditMode tests were skipped for this run." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${ILCPP_RESULT}" = "skipped" ]; then
            echo "> Unity IL2CPP link.xml smoke was skipped for this run." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${ILCPP_RESULT}" != "success" ]; then
            echo "> :warning: Unity IL2CPP link.xml smoke result: ${ILCPP_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${PACKAGE_RESULT}" != "success" ] && [ "${PACKAGE_RESULT}" != "skipped" ]; then
            echo "> Unity plugin packaging result: ${PACKAGE_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${NATIVE_RESULT}" != "success" ] && [ "${NATIVE_RESULT}" != "skipped" ]; then
            echo "> Native validation result: ${NATIVE_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          fi
