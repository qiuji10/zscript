name: Unity Plugin Package

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-plugin:
    name: Build plugin (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            artifact_name: unity-plugin-windows-x64
          - label: linux-x64
            os: ubuntu-latest
            artifact_name: unity-plugin-linux-x64
          - label: macos-universal
            os: macos-14
            artifact_name: unity-plugin-macos

    env:
      BUILD_DIR: build-unity-plugin
      STAGE_DIR: ${{ github.workspace }}/stage

    steps:
      - uses: actions/checkout@v5

      - name: Cache CMake deps
        uses: actions/cache@v5
        with:
          path: ${{ env.BUILD_DIR }}/_deps
          key: unity-plugin-${{ matrix.label }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: unity-plugin-${{ matrix.label }}-

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path $env:BUILD_DIR) { Remove-Item -Recurse -Force $env:BUILD_DIR }
          if (Test-Path $env:STAGE_DIR) { Remove-Item -Recurse -Force $env:STAGE_DIR }
          cmake -B $env:BUILD_DIR -A x64 `
            -DZSCRIPT_UNITY=ON `
            -DCMAKE_BUILD_TYPE=Release `
            -DUNITY_PLUGINS_DIR="$env:GITHUB_WORKSPACE/stage/Plugins"

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          rm -rf "$BUILD_DIR" "$STAGE_DIR"
          cmake -B "$BUILD_DIR" \
            -DZSCRIPT_UNITY=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DUNITY_PLUGINS_DIR="$GITHUB_WORKSPACE/stage/Plugins"

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rm -rf "$BUILD_DIR" "$STAGE_DIR"
          cmake -B "$BUILD_DIR" \
            -DZSCRIPT_UNITY=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DUNITY_PLUGINS_DIR="$GITHUB_WORKSPACE/stage/Plugins"

      - name: Build plugin
        run: cmake --build ${{ env.BUILD_DIR }} --config Release --target zscript_unity --parallel

      - name: Install plugin into staging
        run: cmake --install ${{ env.BUILD_DIR }} --config Release

      - name: List staged files
        shell: bash
        run: find "$STAGE_DIR" -type f | sort

      - name: Upload staged plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.STAGE_DIR }}
          if-no-files-found: error

  package-unity-plugins:
    name: Package combined Unity plugins
    needs: build-plugin
    runs-on: ubuntu-latest

    steps:
      - name: Download staged plugin artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: unity-plugin-*
          path: package
          merge-multiple: true

      - name: Show packaged files
        shell: bash
        run: find package -type f | sort

      - name: Upload combined Unity plugin package
        uses: actions/upload-artifact@v6
        with:
          name: unity-plugin-package
          path: package
          if-no-files-found: error
