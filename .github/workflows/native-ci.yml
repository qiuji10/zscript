name: Native CI

on:
  workflow_call:
    inputs:
      rng_seed:
        description: "Catch2 RNG seed override"
        required: false
        type: string
        default: ""
      run_fuzz:
        description: "Whether to run the fuzz smoke jobs"
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      rng_seed:
        description: "Catch2 RNG seed to pass to tests, e.g. 1150817212"
        required: false
        type: string
        default: ""
      run_fuzz:
        description: "Run fuzz smoke jobs"
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Build/Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      ZSCRIPT_TEST_RNG_SEED: ${{ inputs.rng_seed || '' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Resolve test RNG seed
        shell: bash
        run: |
          if [ -n "${ZSCRIPT_TEST_RNG_SEED}" ]; then
            seed="${ZSCRIPT_TEST_RNG_SEED}"
            source="workflow input"
          else
            seed="$(( (GITHUB_RUN_ID + GITHUB_RUN_ATTEMPT) % 4294967295 ))"
            if [ "${seed}" -eq 0 ]; then
              seed=1
            fi
            source="generated from run context"
          fi
          echo "Resolved Catch2 RNG seed: ${seed} (${source})"
          echo "RESOLVED_TEST_RNG_SEED=${seed}" >> "$GITHUB_ENV"

      - name: Cache build dependencies
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: deps-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-${{ matrix.os }}-

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DZSCRIPT_TEST_RNG_SEED="${{ env.RESOLVED_TEST_RNG_SEED }}"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        shell: bash
        run: |
          echo "Running ctest with Catch2 RNG seed: ${{ env.RESOLVED_TEST_RNG_SEED }}"
          ctest --test-dir build -C Release --output-on-failure --parallel 4 \
            --output-junit "$PWD/build/native-${{ matrix.os }}.junit.xml"

      - name: Upload JUnit test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: native-junit-${{ matrix.os }}
          path: build/native-${{ matrix.os }}.junit.xml
          if-no-files-found: warn

  fuzz:
    name: Fuzzer (${{ matrix.os }})
    if: ${{ inputs.run_fuzz }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            install: sudo apt-get install -y clang ninja-build
            clang: clang++
            generator: ""
            exe: ./build-fuzz/fuzz_lexer_parser
            asan_options: ""
          - os: macos-latest
            install: brew install llvm ninja
            clang: "$(brew --prefix llvm)/bin/clang++"
            generator: ""
            exe: ./build-fuzz/fuzz_lexer_parser
            asan_options: ""
          - os: windows-latest
            install: echo "LLVM and Ninja pre-installed"
            clang: "C:/Program Files/LLVM/bin/clang++.exe"
            generator: "-G Ninja"
            exe: ./build-fuzz/fuzz_lexer_parser.exe
            asan_options: "detect_container_overflow=0"

    steps:
      - uses: actions/checkout@v5

      - name: Install / verify clang
        run: ${{ matrix.install }}

      - name: Cache build dependencies
        uses: actions/cache@v5
        with:
          path: build-fuzz/_deps
          key: deps-fuzz-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-fuzz-${{ matrix.os }}-

      - name: Configure
        run: >
          cmake -B build-fuzz
          ${{ matrix.generator }}
          -DCMAKE_CXX_COMPILER="${{ matrix.clang }}"
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DZSCRIPT_FUZZ=ON

      - name: Build fuzzer
        run: cmake --build build-fuzz --target fuzz_lexer_parser --parallel

      - name: Add ASAN runtime to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dll = Get-ChildItem 'C:\Program Files\LLVM' -Recurse -Filter 'clang_rt.asan_dynamic-x86_64.dll' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($dll) { $dll.DirectoryName | Out-File $env:GITHUB_PATH -Append -Encoding utf8 }

      - name: Run fuzzer (30 s smoke run)
        env:
          ASAN_OPTIONS: ${{ matrix.asan_options }}
        run: >
          ${{ matrix.exe }} fuzz/corpus
          -max_len=4096
          -timeout=5
          -max_total_time=30
          -rss_limit_mb=4096
          -print_final_stats=1
