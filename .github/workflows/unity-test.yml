name: Unity EditMode Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ──────────────────────────────────────────────────────────────────────────────
# Security model (public repo, self-hosted runners on personal machines):
#   1. Only invoke this workflow from trusted push/manual parent workflows — never
#      from pull_request. This prevents fork PRs from running arbitrary code on
#      your machines.
#   2. `if: github.repository_owner == 'qiuji10'` guard on every job.
#      Even if the workflow file is copied, it cannot run on a fork.
#   3. GitHub Environment "unity-runner" — configure it in Settings → Environments
#      with "Required reviewers: qiuji10" so every run needs your explicit approval.
#
# Kill switches (repo variables — set in Settings → Secrets and variables → Variables):
#   UNITY_RUNNER_ENABLED  — set to 'false' to skip all Unity test jobs without
#                           editing this file (useful when runner machine is down
#                           for maintenance or the runner is not yet configured).
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Windows runner  (labels: self-hosted, windows, unity)
  # ─────────────────────────────────────────────────────────────────────────────
  unity-test-windows:
    name: EditMode tests (Windows)
    # Skip if: wrong owner, or kill switch is off, or runner not yet online.
    if: |
      github.repository_owner == 'qiuji10' &&
      vars.UNITY_RUNNER_ENABLED != 'false'
    runs-on: [ self-hosted, windows, unity ]
    environment: unity-runner
    # Machine being offline never fails the workflow — it just marks this job
    # as skipped so merges and checks are not blocked.
    continue-on-error: true

    env:
      BUILD_DIR: build-unity
      UNITY_PATH: ${{ vars.UNITY_PATH || 'C:\Program Files\Unity\Hub\Editor\6000.3.9f1\Editor\Unity.exe' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Configure CMake (MSVC x64)
        shell: cmd
        run: |
          if exist %BUILD_DIR% rmdir /s /q %BUILD_DIR%
          cmake -B %BUILD_DIR% -A x64 ^
            -DZSCRIPT_UNITY=ON ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DUNITY_PLUGINS_DIR=%CD%\unity\com.zscript.runtime\Plugins

      - name: Build zscript_unity
        shell: cmd
        run: cmake --build %BUILD_DIR% --config Release --target zscript_unity

      - name: Install DLL into Plugins/
        shell: cmd
        run: cmake --install %BUILD_DIR% --config Release

      - name: Clean Unity temp files
        shell: cmd
        run: |
          if exist unity\UnityProject\Temp rmdir /s /q unity\UnityProject\Temp
          if exist unity\UnityProject\Logs rmdir /s /q unity\UnityProject\Logs
          if exist unity\UnityProject\Library rmdir /s /q unity\UnityProject\Library

      - name: Run EditMode tests
        shell: pwsh
        timeout-minutes: 15
        run: |
          $RepoRoot = (Get-Location).Path
          $proc = Start-Process -FilePath "$env:UNITY_PATH" `
            -ArgumentList "-batchmode -nographics -projectPath `"$RepoRoot\unity\UnityProject`" -runTests -testPlatform EditMode -testResults `"$RepoRoot\unity\UnityProject\TestResults.xml`" -logFile `"$RepoRoot\unity\UnityProject\UnityTest.log`"" `
            -PassThru
          $proc.WaitForExit()
          exit $proc.ExitCode

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unity-test-results-windows
          path: |
            unity/UnityProject/TestResults.xml
            unity/UnityProject/UnityTest.log

      - name: Convert NUnit3 results to JUnit
        if: always()
        shell: pwsh
        run: |
          python tools/nunit3_to_junit.py `
            unity/UnityProject/TestResults.xml `
            unity/UnityProject/TestResults.junit.xml

      - name: Upload JUnit test report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unity-junit-windows
          path: unity/UnityProject/TestResults.junit.xml
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  # macOS runner  (labels: self-hosted, macos, unity)
  # ─────────────────────────────────────────────────────────────────────────────
  unity-test-macos:
    name: EditMode tests (macOS)
    if: |
      github.repository_owner == 'qiuji10' &&
      vars.UNITY_RUNNER_ENABLED != 'false'
    runs-on: [ self-hosted, macos, unity ]
    environment: unity-runner
    continue-on-error: true

    env:
      BUILD_DIR: build-unity
      UNITY_PATH: ${{ vars.UNITY_PATH_MAC || '/Applications/Unity/Hub/Editor/6000.3.9f1/Unity.app/Contents/MacOS/Unity' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Configure CMake (macOS)
        run: |
          rm -rf "$BUILD_DIR"
          cmake -B "$BUILD_DIR" \
            -DZSCRIPT_UNITY=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DUNITY_PLUGINS_DIR="$PWD/unity/com.zscript.runtime/Plugins"

      - name: Build zscript_unity
        run: cmake --build "$BUILD_DIR" --config Release --target zscript_unity

      - name: Install dylib/bundle into Plugins/
        run: cmake --install "$BUILD_DIR" --config Release

      - name: Remove macOS quarantine from plugin
        run: xattr -rd com.apple.quarantine unity/com.zscript.runtime/Plugins/macOS/ || true

      - name: Clean Unity temp files
        run: rm -rf unity/UnityProject/Temp unity/UnityProject/Logs unity/UnityProject/Library

      - name: Run EditMode tests
        timeout-minutes: 15
        run: |
          "$UNITY_PATH" \
            -batchmode -nographics \
            -projectPath "$PWD/unity/UnityProject" \
            -runTests -testPlatform EditMode \
            -testResults "$PWD/unity/UnityProject/TestResults.xml" \
            -logFile "$PWD/unity/UnityProject/UnityTest.log"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unity-test-results-macos
          path: |
            unity/UnityProject/TestResults.xml
            unity/UnityProject/UnityTest.log

      - name: Convert NUnit3 results to JUnit
        if: always()
        run: |
          python3 tools/nunit3_to_junit.py \
            unity/UnityProject/TestResults.xml \
            unity/UnityProject/TestResults.junit.xml

      - name: Upload JUnit test report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unity-junit-macos
          path: unity/UnityProject/TestResults.junit.xml
          if-no-files-found: warn
