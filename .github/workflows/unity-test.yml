name: Unity EditMode Tests

# ──────────────────────────────────────────────────────────────────────────────
# Security model (public repo, self-hosted runners on personal machines):
#   1. Only push to main/engine-tooling and manual dispatch — never pull_request.
#      This prevents fork PRs from running arbitrary code on your machines.
#   2. `if: github.repository_owner == 'qiuji10'` guard on every job.
#      Even if the workflow file is copied, it cannot run on a fork.
#   3. GitHub Environment "unity-runner" — configure it in Settings → Environments
#      with "Required reviewers: qiuji10" so every run needs your explicit approval.
#
# Kill switches (repo variables — set in Settings → Secrets and variables → Variables):
#   UNITY_RUNNER_ENABLED  — set to 'false' to skip all Unity test jobs without
#                           editing this file (useful when runner machine is down
#                           for maintenance or the runner is not yet configured).
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main, engine-tooling ]
    paths:
      - 'src/**'
      - 'unity/**'
      - 'CMakeLists.txt'
      - '.github/workflows/unity-test.yml'
  workflow_dispatch:

# Cancel in-progress runs on the same branch to avoid queuing on the runners.
concurrency:
  group: unity-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Windows runner  (labels: self-hosted, windows, unity)
  # ─────────────────────────────────────────────────────────────────────────────
  unity-test-windows:
    name: EditMode tests (Windows)
    # Skip if: wrong owner, or kill switch is off, or runner not yet online.
    if: |
      github.repository_owner == 'qiuji10' &&
      vars.UNITY_RUNNER_ENABLED != 'false'
    runs-on: [ self-hosted, windows, unity ]
    environment: unity-runner
    # Machine being offline never fails the workflow — it just marks this job
    # as skipped so merges and checks are not blocked.
    continue-on-error: true

    env:
      BUILD_DIR: build-unity
      UNITY_PATH: ${{ vars.UNITY_PATH || 'C:\Program Files\Unity\Hub\Editor\6000.3.9f1\Editor\Unity.exe' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure CMake (MSVC x64)
        shell: cmd
        run: |
          cmake -B %BUILD_DIR% -A x64 ^
            -DZSCRIPT_UNITY=ON ^
            -DCMAKE_BUILD_TYPE=Release

      - name: Build zscript_unity
        shell: cmd
        run: cmake --build %BUILD_DIR% --config Release --target zscript_unity

      - name: Install DLL into Plugins/
        shell: cmd
        run: cmake --install %BUILD_DIR% --config Release

      - name: Run EditMode tests
        shell: cmd
        run: |
          "%UNITY_PATH%" ^
            -batchmode -nographics -quit ^
            -projectPath unity\UnityProject ^
            -runTests -testPlatform EditMode ^
            -testResults unity\UnityProject\TestResults.xml ^
            -logFile unity\UnityProject\UnityTest.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results-windows
          path: |
            unity/UnityProject/TestResults.xml
            unity/UnityProject/UnityTest.log

      - name: Publish NUnit test results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: unity/UnityProject/TestResults.xml
          check_name: Unity EditMode Tests (Windows)
          fail_on_failure: true

  # ─────────────────────────────────────────────────────────────────────────────
  # macOS runner  (labels: self-hosted, macos, unity)
  # ─────────────────────────────────────────────────────────────────────────────
  unity-test-macos:
    name: EditMode tests (macOS)
    if: |
      github.repository_owner == 'qiuji10' &&
      vars.UNITY_RUNNER_ENABLED != 'false'
    runs-on: [ self-hosted, macos, unity ]
    environment: unity-runner
    continue-on-error: true

    env:
      BUILD_DIR: build-unity
      UNITY_PATH: ${{ vars.UNITY_PATH_MAC || '/Applications/Unity/Hub/Editor/6000.3.9f1/Unity.app/Contents/MacOS/Unity' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure CMake (macOS)
        run: |
          cmake -B "$BUILD_DIR" \
            -DZSCRIPT_UNITY=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build zscript_unity
        run: cmake --build "$BUILD_DIR" --config Release --target zscript_unity

      - name: Install dylib/bundle into Plugins/
        run: cmake --install "$BUILD_DIR" --config Release

      - name: Run EditMode tests
        run: |
          "$UNITY_PATH" \
            -batchmode -nographics -quit \
            -projectPath unity/UnityProject \
            -runTests -testPlatform EditMode \
            -testResults unity/UnityProject/TestResults.xml \
            -logFile unity/UnityProject/UnityTest.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results-macos
          path: |
            unity/UnityProject/TestResults.xml
            unity/UnityProject/UnityTest.log

      - name: Publish NUnit test results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: unity/UnityProject/TestResults.xml
          check_name: Unity EditMode Tests (macOS)
          fail_on_failure: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Summary — runs after both engine jobs regardless of their outcome.
  # Posts a visible notice when Unity jobs were skipped (kill switch or no runner).
  # ─────────────────────────────────────────────────────────────────────────────
  unity-summary:
    name: Unity CI summary
    if: always() && github.repository_owner == 'qiuji10'
    needs: [ unity-test-windows, unity-test-macos ]
    runs-on: ubuntu-latest

    steps:
      - name: Report skipped jobs
        env:
          WIN_RESULT:  ${{ needs.unity-test-windows.result }}
          MAC_RESULT:  ${{ needs.unity-test-macos.result }}
          ENABLED:     ${{ vars.UNITY_RUNNER_ENABLED }}
        run: |
          echo "### Unity CI summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Runner  | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | $WIN_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS   | $MAC_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$WIN_RESULT" = "skipped" ] || [ "$MAC_RESULT" = "skipped" ]; then
            echo "> [!NOTE]" >> $GITHUB_STEP_SUMMARY
            if [ "$ENABLED" = "false" ]; then
              echo "> Unity runner jobs were skipped because **UNITY_RUNNER_ENABLED** is set to \`false\`." >> $GITHUB_STEP_SUMMARY
            else
              echo "> One or more Unity runner jobs were skipped (runner offline or not yet configured)." >> $GITHUB_STEP_SUMMARY
            fi
          fi

          if [ "$WIN_RESULT" = "failure" ] || [ "$MAC_RESULT" = "failure" ]; then
            echo "> [!CAUTION]" >> $GITHUB_STEP_SUMMARY
            echo "> Unity tests **failed** on at least one platform. Check the test result artifacts." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
